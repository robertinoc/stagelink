name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check ──────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build types package (required by other packages)
        run: pnpm --filter @stagelink/types build

      - name: Type-check all packages
        run: pnpm -r typecheck

  # ── 2. API unit tests ──────────────────────────────────────────────────────
  api-tests:
    name: API Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @stagelink/types build

      - name: Run API tests
        run: pnpm --filter @stagelink/api test -- --ci --reporters=default --reporters=jest-junit
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml
          # Stub required env vars so NestJS config doesn't throw
          DATABASE_URL: postgresql://user:pass@localhost:5432/test
          WORKOS_API_KEY: test_key
          WORKOS_CLIENT_ID: client_test
          WORKOS_REDIRECT_URI: http://localhost:3000/api/auth/callback
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test_anon_key
          JWT_SECRET: test_secret_32_chars_minimum_here
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: test-bucket

      - name: Annotate test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: apps/api/test-results/junit.xml
          check_name: API Test Results
          fail_on_failure: true

  # ── 3. Web unit tests ──────────────────────────────────────────────────────
  web-tests:
    name: Web Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @stagelink/types build

      - name: Run Web tests with coverage
        run: pnpm --filter @stagelink/web test:coverage
        env:
          CI: true

      - name: Annotate test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: apps/web/test-results/junit.xml
          check_name: Web Test Results
          fail_on_failure: true

      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: apps/web

  # ── 4. Production build ────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, api-tests, web-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build types and UI packages
        run: |
          pnpm --filter @stagelink/types build
          pnpm --filter @stagelink/ui build

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/web/pnpm-lock.yaml', 'pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build web app
        run: pnpm --filter @stagelink/web build
        env:
          # Placeholder env vars — build must succeed without real secrets
          NEXT_PUBLIC_API_URL: https://api.stagelink.link
          NEXT_PUBLIC_APP_URL: https://stagelink.link
          WORKOS_API_KEY: build_placeholder
          WORKOS_CLIENT_ID: build_placeholder
          WORKOS_COOKIE_PASSWORD: build_placeholder_32_chars_minimum_
          WORKOS_REDIRECT_URI: https://stagelink.link/api/auth/callback
          NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
