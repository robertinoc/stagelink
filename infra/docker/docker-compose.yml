services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stagelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stagelink}
      POSTGRES_DB: ${POSTGRES_DB:-stagelink_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stagelink} -d ${POSTGRES_DB:-stagelink_dev}']
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible local storage (MinIO)
  # API console: http://localhost:9001  user: stagelink  pass: stagelink123
  # S3 endpoint:  http://localhost:9000
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-stagelink}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-stagelink123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
