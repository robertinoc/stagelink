# Railway deployment configuration for StageLink API.
#
# Single source of truth — replaces railway.json and apps/api/railway.toml.
# The Dockerfile build context is the repo root (monorepo).

[build]
builder      = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Run Prisma migrations then start the API.
# WORKDIR inside the container is /app/apps/api (set in Dockerfile).
startCommand         = "pnpm db:migrate:prod && pnpm start"
healthcheckPath      = "/api/health"
healthcheckTimeout   = 120
restartPolicyType    = "ON_FAILURE"
restartPolicyMaxRetries = 3
